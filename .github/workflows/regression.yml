name: Verilog CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: actions/configure-pages@v5
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          curl -L https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-04-19/oss-cad-suite-linux-x64-20260419.tgz -o oss.tgz
          wget https://www.accellera.org/images/downloads/standards/uvm/uvm-1.2.tar.gz
          mkdir -p $HOME/dev/sda6/oss-cad-suite/
          mkdir -p $HOME/dev/sda6/UVM/UVM1.2/
          tar -xzf oss.tgz -C $HOME/dev/sda6/
          tar -xzf uvm-1.2.tar.gz -C $HOME/dev/sda6/UVM/UVM1.2/ --strip-components=1
          ls $HOME/dev/sda6
          ls $HOME/dev/sda6/UVM/UVM1.2/src

      - name: Regression with GATE_FLOW OFF (iverilog)
        run: make all ARG="-DGATE_FLOW_OFF" 2>&1 | tee tb_dataflow.log

      - name: Regression with GATE_FLOW ON (iverilog)
        run: make all 2>&1 | tee tb_gateflow.log

      - name: Modules regression (verilator)
        run: make regression SIM=v RM_OBJDIR=true 2>&1 | tee tb_modules.log

      - name: RV32I application tests
        run: make risc SIM=v RM_OBJDIR=true 2>&1 | tee tb_rv32i.log

      - name: RV32I Design verification Cpp testbench
        run: make riscdv ARG='-CFLAGS "-DVERBOSITY=0"' 2>&1 | tee uvm_riscdv.log

      - name: UART C++ and verilog tests
        run: make uart SIM=v RM_OBJDIR=true 2>&1 | tee tb_uart.log

      - name: FIFO UVM testbench
        run: make uvm-fifo 2>&1 | tee uvm_fifo.log

      - name: ALU SystemVerilog testbench 8 bit
        run: make alu ARG=-DXLEN=8 RM_OBJDIR=true 2>&1 | tee sv_alu8.log

      - name: ALU SystemVerilog testbench 16 bit
        run: make alu ARG=-DXLEN=16 RM_OBJDIR=true 2>&1 | tee sv_alu16.log

      - name: ALU SystemVerilog testbench 32 bit
        run: make alu ARG=-DXLEN=32 RM_OBJDIR=true 2>&1 | tee sv_alu32.log

      - name: ALU SystemVerilog testbench 64 bit
        run: make alu ARG=-DXLEN=64 RM_OBJDIR=true 2>&1 | tee sv_alu64.log

      - name: Memory UVM testbench 8 bit
        run: make uvm-mem ARG=-DDATA_WIDTH=8 2>&1 | tee uvm_mem8.log

      - name: Memory UVM testbench 16 bit
        run: make uvm-mem ARG=-DDATA_WIDTH=16 2>&1 | tee uvm_mem16.log

      - name: Memory UVM testbench 32 bit
        run: make uvm-mem ARG=-DDATA_WIDTH=32 2>&1 | tee uvm_mem32.log

      - name: Memory UVM testbench 64 bit
        run: make uvm-mem ARG=-DDATA_WIDTH=64 2>&1 | tee uvm_mem64.log

      - name: RISCV Instruction Memory UVM testbench 16 bit
        run: make uvm-inst ARG=-DDATA_WIDTH=16 2>&1 | tee uvm_inst16.log

      - name: RISCV Instruction Memory UVM testbench 32 bit
        run: make uvm-inst ARG=-DDATA_WIDTH=32 2>&1 | tee uvm_inst32.log

      - name: Results Summary
        run: make grep_err

      - name: Coverage report
        run: make get_coverage || cat coverage_merged_notb.dat

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./covhtml

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
